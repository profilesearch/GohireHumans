// ─── Theme ────────────────────────────────────────────────────────────
function setTheme(t) {
  state.theme = t;
  document.documentElement.setAttribute('data-theme', t);
}
setTheme(state.theme);

// ─── API Client ───────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const authParam = state.token ? `${sep}token=${state.token}` : '';
  const url = `${API}${path}${authParam}`;
  const res = await fetch(url, {
    method: opts.method || 'GET',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok && data.error) throw new Error(data.error);
  return data;
}

// ─── Toast ────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function getRouteParams() {
  const parts = getRoute().split('/').filter(Boolean);

}

// ─── Render Engine ────────────────────────────────────────────────────
function render() {
  const route = getRoute();
  const app = document.getElementById('app');

  if (!state.user) {
    if (route.startsWith('/register')) return renderAuth('register');
    if (route.startsWith('/terms')) return renderTerms();
    if (route.startsWith('/guidelines')) return renderGuidelines();
    if (route.startsWith('/login')) return renderAuth('login');
    if (route === '/' || route === '') return renderLanding();
    return renderLanding();
  }

  // Authenticated routes
  if (route.startsWith('/task/')) return renderTaskDetail(route.split('/')[2]);
  if (route === '/tasks') return renderTasks();
  if (route === '/create-task') return renderCreateTask();
  if (route === '/api-keys') return renderApiKeys();
  if (route === '/webhooks') return renderWebhooks();
  if (route === '/playground') return renderPlayground();
  if (route === '/payments') return renderPayments();
  if (route === '/profile') return renderProfile();
  if (route === '/admin') return renderDashboard();

  if (route === '/admin/audit') return renderAdminAudit();

  if (route === '/notifications') return renderNotifications();
  if (route === '/matching') return renderMatching();
  if (route === '/verification') return renderVerification();
  if (route === '/templates') return renderTemplates();
  if (route === '/batch') return renderBatchCreate();

  if (route === '/file-upload') return renderFileUpload();
  if (route === '/terms') return renderTerms();

}

function selectRole(role) {
  document.getElementById('role-card-hire').classList.toggle('selected', role === 'ai_client');

  if (roleField) roleField.value = role;

async function handleAuth(e, mode) {
  e.preventDefault();
  const form = new FormData(e.target);
  const body = Object.fromEntries(form);

  try {
    const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
    const data = await api(endpoint, { method: 'POST', body });
    state.user = data;
    state.token = data.token;
    toast(mode === 'login' ? 'Welcome back!' : 'Account created!', 'success');
    navigate('#/');
  } catch (err) {
    toast(err.message, 'error');
  }
}

function logout() {
  api('/auth/logout', { method: 'POST' }).catch(() => {});
  state.user = null;
  state.token = null;
  navigate('#/');
}

function esc(s) { return s ? s.replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

// ─── Tasks List ───────────────────────────────────────────────────────
async function renderTasks() {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'tasks');

  const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
  const status = params.get('status') || '';
  const category = params.get('category') || '';

  try {
    let url = '/api/v1/tasks?per_page=50';
    if (status) url += `&status=${status}`;
    if (category) url += `&category=${category}`;

    const data = await api(url);
    const tasks = data.tasks || [];

    const categories = ['phone_call','in_person_errand','document_signing','media_capture','expert_review','data_entry','research','writing','translation','customer_support','testing','inspection','delivery','other'];
    const statuses = ['draft','open','reserved','in_progress','submitted','completed','disputed','canceled'];

    appShell(`
      <h1 class="page-title">${state.user.role === 'worker' ? 'Browse Tasks' : state.user.role === 'admin' ? 'All Tasks' : 'My Tasks'}</h1>
      <p class="page-desc">${data.total} task${data.total !== 1 ? 's' : ''} found</p>

      <div class="filters-bar">
        <select class="select" onchange="filterTasks('status', this.value)">
          <option value="">All statuses</option>
          ${statuses.map(s => `<option value="${s}" ${status===s?'selected':''}>${s.replace('_',' ')}</option>`).join('')}
        </select>
        <select class="select" onchange="filterTasks('category', this.value)">
          <option value="">All categories</option>
          ${categories.map(c => `<option value="${c}" ${category===c?'selected':''}>${c.replace(/_/g,' ')}</option>`).join('')}
        </select>
        ${state.user.role === 'ai_client' ? `<button class="btn btn-primary btn-sm" onclick="navigate('#/create-task')">Create Task</button>` : ''}
      </div>

      <div class="task-list">
        ${tasks.length ? tasks.map(t => taskCard(t)).join('') : '<div class="empty-state"><p>No tasks match your filters</p></div>'}
      </div>
    `, 'tasks');
  } catch (err) {
    appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'tasks');
  }
}

function filterTasks(key, val) {
  const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
  if (val) params.set(key, val); else params.delete(key);
  const qs = params.toString();
  window.location.hash = `/tasks${qs ? '?' + qs : ''}`;
}

// ─── Task Detail ──────────────────────────────────────────────────────
async function renderTaskDetail(id) {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'tasks');

  try {
    const task = await api(`/api/v1/tasks/${id}`);
    const skills = JSON.parse(task.required_skills || '[]');
    const attachments = JSON.parse(task.attachments || '[]');
    const files = JSON.parse(task.deliverables_files || '[]');
    const role = state.user.role;
    const isClient = task.client_id === state.user.id;
    const isWorker = task.worker_id === state.user.id;

    let actions = '';
    if (role === 'worker' && task.status === 'open') {
      actions = `<button class="btn btn-primary" onclick="acceptTask(${id})">Accept Task</button>`;
    }
    if (role === 'worker' && isWorker && task.status === 'in_progress') {
      actions = `<button class="btn btn-primary" onclick="showSubmitModal(${id})">Submit Deliverables</button>`;
    }
    if ((isClient || role === 'admin') && task.status === 'submitted') {
      actions = `
        <button class="btn btn-primary" onclick="completeTask(${id})">Approve &amp; Complete</button>
        <button class="btn btn-secondary btn-sm" onclick="showQualityReviewInline(${id})">Quality Review</button>
        <button class="btn btn-danger btn-sm" onclick="disputeTask(${id})">Dispute</button>
      `;
    }
    if ((isClient || role === 'admin') && ['open','in_progress','reserved'].includes(task.status)) {
      actions += `<button class="btn btn-ghost btn-sm" onclick="cancelTask(${id})">Cancel Task</button>`;
    }
    if (task.status === 'completed' && (isClient || isWorker)) {
      const alreadyRated = (task.ratings || []).some(r => r.from_user_id === state.user.id);
      if (!alreadyRated) {
        actions += `<button class="btn btn-secondary btn-sm" onclick="showRateModal(${id})">Leave Rating</button>`;
      }
    }
    if (role === 'worker' && !isWorker) {
      actions += `<button class="btn btn-ghost btn-sm" onclick="flagEntity('task', ${id})">Report Task</button>`;
    }

    appShell(`
      <div class="detail-header">
        <button class="detail-back" onclick="navigate('#/tasks')">${icons.back} Back to tasks</button>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap">
          <div>
            <div class="detail-title">${esc(task.title)}</div>
            <div class="detail-meta">
              <span class="badge badge-${task.status}">${task.status.replace('_',' ')}</span>
              <span>${icons.dollar} $${Number(task.budget_amount).toFixed(2)} ${task.budget_type === 'hourly' ? '/hr' : 'flat'}</span>
              <span>${icons.location} ${task.location_type === 'remote' ? 'Remote' : esc(task.location_detail || task.location_type)}</span>
              <span>${icons.clock} ${task.category.replace(/_/g, ' ')}</span>
            </div>
          </div>
          <div style="display:flex;gap:var(--space-2);flex-wrap:wrap">${actions}</div>
        </div>
      </div>

      <div class="detail-body">
        <div class="detail-content">
          <div class="card" style="margin-bottom:var(--space-4)">
            <div class="card-header"><div class="card-title">Description</div></div>
            <div style="font-size:var(--text-sm);color:var(--color-text);line-height:1.7;white-space:pre-wrap">${esc(task.description)}</div>
          </div>

          ${skills.length ? `
            <div class="card" style="margin-bottom:var(--space-4)">
              <div class="card-header"><div class="card-title">Required Skills</div></div>
              <div style="display:flex;gap:var(--space-2);flex-wrap:wrap">
                ${skills.map(s => `<span class="badge badge-open">${s.replace(/_/g,' ')}</span>`).join('')}
              </div>
            </div>
          ` : ''}

          ${task.deliverables_text ? `
            <div class="card" style="margin-bottom:var(--space-4)">
              <div class="card-header"><div class="card-title">Deliverables</div></div>
              <div style="font-size:var(--text-sm);white-space:pre-wrap">${esc(task.deliverables_text)}</div>
              ${files.length ? `<div style="margin-top:var(--space-3);font-size:var(--text-xs);color:var(--color-text-muted)">${files.length} file(s) attached</div>` : ''}
            </div>
          ` : ''}

          <div id="task-qr-section"></div>

          ${(task.ratings || []).length ? `
            <div class="card">
              <div class="card-header"><div class="card-title">Ratings</div></div>
              ${task.ratings.map(r => `
                <div style="padding:var(--space-3) 0;border-bottom:1px solid var(--color-divider)">
                  <div class="stars" style="margin-bottom:var(--space-1)">
                    ${[1,2,3,4,5].map(i => `<span class="star ${i <= r.rating ? 'filled' : ''}">${i <= r.rating ? icons.star : icons.starEmpty}</span>`).join('')}
                  </div>
                  <div style="font-size:var(--text-sm)">${esc(r.review)}</div>
                  <div style="font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-1)">User #${r.from_user_id}</div>
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>

        <div class="detail-sidebar">
          <div class="card">
            <div class="card-title" style="margin-bottom:var(--space-3)">Task Details</div>
            <div style="font-size:var(--text-xs);display:flex;flex-direction:column;gap:var(--space-2)">
              <div><span style="color:var(--color-text-faint)">Posted by:</span> ${esc(task.client_name)}</div>
              <div><span style="color:var(--color-text-faint)">Category:</span> ${task.category.replace(/_/g,' ')}</div>
              <div><span style="color:var(--color-text-faint)">Budget:</span> $${Number(task.budget_amount).toFixed(2)} ${task.budget_type === 'hourly' ? '/hr' : 'flat fee'}</div>
              ${task.time_cap_hours ? `<div><span style="color:var(--color-text-faint)">Time cap:</span> ${task.time_cap_hours}h</div>` : ''}
              ${task.due_by ? `<div><span style="color:var(--color-text-faint)">Due by:</span> ${task.due_by}</div>` : ''}
              <div><span style="color:var(--color-text-faint)">Location:</span> ${task.location_type === 'remote' ? 'Remote' : esc(task.location_detail || task.location_type)}</div>
              <div><span style="color:var(--color-text-faint)">Created:</span> ${new Date(task.created_at).toLocaleDateString()}</div>
              ${task.worker ? `<div><span style="color:var(--color-text-faint)">Worker:</span> ${esc(task.worker.name)}</div>` : ''}
            </div>
          </div>

          <div class="card">
            <div class="card-title" style="margin-bottom:var(--space-3)">Task ID</div>
            <code style="font-size:var(--text-xs);color:var(--color-text-muted)">#${task.id}</code>
          </div>
        </div>
      </div>
    `, 'tasks');
  } catch (err) {
    appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'tasks');
  }
}

async function acceptTask(id) {
  if (!confirm('Accept this task? You will have 30 minutes to begin working.')) return;
  try {
    await api(`/api/v1/tasks/${id}/accept`, { method: 'POST' });
    toast('Task accepted!', 'success');
    renderTaskDetail(id);
  } catch (err) { toast(err.message, 'error'); }
}

async function cancelTask(id) {
  if (!confirm('Cancel this task? Funds will be refunded.')) return;
  try {
    await api(`/api/v1/tasks/${id}/cancel`, { method: 'POST' });
    toast('Task canceled', 'success');
    renderTaskDetail(id);
  } catch (err) { toast(err.message, 'error'); }
}

async function completeTask(id) {
  if (!confirm('Approve and mark this task as complete?')) return;
  try {
    await api(`/api/v1/tasks/${id}/complete`, { method: 'POST' });

async function handleCreateTask(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  body.required_skills = body.required_skills ? body.required_skills.split(',').map(s => s.trim()).filter(Boolean) : [];
  body.budget_amount = parseFloat(body.budget_amount);
  if (body.time_cap_hours) body.time_cap_hours = parseFloat(body.time_cap_hours);
  else delete body.time_cap_hours;
  if (!body.due_by) delete body.due_by;
  if (!body.location_detail) delete body.location_detail;
  if (!body.idempotency_key) delete body.idempotency_key;

  try {
    const task = await api('/api/v1/tasks', { method: 'POST', body });
    toast('Task created!', 'success');
    navigate(`#/task/${task.id}`);
  } catch (err) { toast(err.message, 'error'); }
}

async function suggestTaskPrice() {
  const form = document.getElementById('createTaskForm');
  if (!form) return;
  const fd = new FormData(form);
  const category = fd.get('category');
  const location_type = fd.get('location_type');
  const required_skills = fd.get('required_skills');

  const suggEl = document.getElementById('priceSuggestion');
  if (!suggEl) return;
  suggEl.textContent = 'Getting suggestion...';
  suggEl.classList.add('visible');

  try {
    let url = `/api/v1/pricing/suggest?category=${encodeURIComponent(category)}&location_type=${encodeURIComponent(location_type)}`;
    if (required_skills) url += `&required_skills=${encodeURIComponent(required_skills)}`;
    const data = await api(url);
    const min = data.min_price || data.suggested_min || data.min;
    const max = data.max_price || data.suggested_max || data.max;
    const suggested = data.suggested_price || data.suggested || data.price;
    if (suggested) {
      suggEl.innerHTML = `Suggested: <strong>$${Number(suggested).toFixed(2)}</strong>${min && max ? ` (range: $${Number(min).toFixed(2)} – $${Number(max).toFixed(2)})` : ''}
        <button type="button" class="btn btn-ghost btn-sm" style="margin-left:var(--space-2)" onclick="document.getElementById('taskBudgetAmount').value='${Number(suggested).toFixed(2)}'">Apply</button>`;
    } else if (min && max) {
      suggEl.innerHTML = `Suggested range: <strong>$${Number(min).toFixed(2)} – $${Number(max).toFixed(2)}</strong>
        <button type="button" class="btn btn-ghost btn-sm" style="margin-left:var(--space-2)" onclick="document.getElementById('taskBudgetAmount').value='${Number(min).toFixed(2)}'">Apply Min</button>`;
    } else {
      suggEl.textContent = 'No price suggestion available for this category.';
    }
  } catch (err) {
    suggEl.textContent = 'Could not fetch price suggestion.';
  }
}

let lastPlaygroundPayload = null;
let playgroundTab = 'json';

function switchPlaygroundTab(btn, tab) {
  playgroundTab = tab;
  btn.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (lastPlaygroundPayload) updatePlaygroundCode(lastPlaygroundPayload);
}

function updatePlaygroundCode(payload) {
  const codeEl = document.getElementById('playgroundCode');
  const apiUrl = `${window.location.origin}${API}`;
  const jsonStr = JSON.stringify(payload, null, 2);

  if (playgroundTab === 'json') {
    codeEl.textContent = jsonStr;
  } else if (playgroundTab === 'curl') {
    codeEl.textContent = `curl -X POST "${apiUrl}/api/v1/tasks?api_key=YOUR_API_KEY" \\
  -H "Content-Type: application/json" \\
  -d '${JSON.stringify(payload)}'`;
  } else if (playgroundTab === 'python') {
    codeEl.textContent = `import requests

API_KEY = "aw_your_key_here"
BASE_URL = "${apiUrl}"

response = requests.post(
    f"{BASE_URL}/api/v1/tasks",
    params={"api_key": API_KEY},
    json=${jsonStr}
)

task = response.json()
print(f"Task #{task['id']} created: {task['status']}")`;
  } else if (playgroundTab === 'node') {

async function updateProfile(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  if (body.skills_raw) {
    body.skills = body.skills_raw.split(',').map(s => s.trim()).filter(Boolean);
    delete body.skills_raw;
  }
  if (body.hourly_rate_min) body.hourly_rate_min = parseFloat(body.hourly_rate_min);
  if (body.hourly_rate_max) body.hourly_rate_max = parseFloat(body.hourly_rate_max);

  try {
    await api('/profile', { method: 'PUT', body });
    toast('Profile updated', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function renderNotifications() {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'notifications');

    appShell(`

        <div>
          <h1 class="page-title">Notifications</h1>

        </div>
        ${notifs.some(n => !n.is_read) ? `<button class="btn btn-secondary btn-sm" onclick="markAllNotifsRead()">Mark all read</button>` : ''}
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        ${notifs.length ? notifs.map(n => `
          <div class="notif-item ${!n.is_read ? 'unread' : ''}" onclick="handleNotifClick(${n.id}, '${n.link || ''}')">
            <div class="notif-item-title">${esc(n.title)}</div>
            <div class="notif-item-body">${esc(n.message)}</div>
            <div class="notif-item-time">${new Date(n.created_at).toLocaleString()}</div>
          </div>
        `).join('') : `
          <div class="empty-state">
            <p>No notifications yet</p>
          </div>
        `}
      </div>
    `, 'notifications');

    // Update bell badge after load
    updateNotifBell(notifs);
  } catch (err) {
    appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'notifications');
  }
}

async function handleNotifClick(id, link) {
  try {
    await api(`/api/v1/notifications/${id}/read`, { method: 'POST' });
  } catch (e) {}
  if (link && link !== 'null' && link !== 'undefined' && link !== '') {
    navigate(`#${link}`);
  }
}

async function markAllNotifsRead() {
  try {
    await api('/api/v1/notifications/read-all', { method: 'POST' });
    toast('All notifications marked as read', 'success');
    renderNotifications();
  } catch (err) { toast(err.message, 'error'); }
}

function updateNotifBell(notifs) {
  const bell = document.getElementById('notifBell');
  if (!bell) return;
  const unread = notifs.filter(n => !n.is_read).length;
  const existing = bell.querySelector('.notif-badge');
  if (existing) existing.remove();
  if (unread > 0) {
    const badge = document.createElement('span');
    badge.className = 'notif-badge';
    badge.textContent = unread > 9 ? '9+' : unread;
    bell.appendChild(badge);
  }
}

async function loadNotifCount() {
  try {
    const data = await api('/api/v1/notifications');
    const notifs = data.notifications || data || [];
    updateNotifBell(notifs);
  } catch (e) {}
}

        </p>
        <div class="form-group">
          <label class="label">Tasks</label>
          <textarea class="textarea" name="tasks_raw" rows="10" placeholder='[{"title": "Call vendor A", "description": "Confirm order status"},{"title": "Call vendor B", "description": "Get quote"}]' required></textarea>

      </div>

      <div id="batchResult"></div>
      <button type="submit" class="btn btn-primary btn-lg">Create All Tasks</button>
    </form>

async function handleBatchCreate(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const raw = fd.get('tasks_raw').trim();
  const defaults = {
    category: fd.get('category'),
    location_type: fd.get('location_type'),
    budget_type: fd.get('budget_type'),
    budget_amount: parseFloat(fd.get('budget_amount')),
  };

  let tasks;
  try {
    if (raw.startsWith('[')) {
      tasks = JSON.parse(raw);
    } else {
      tasks = raw.split('\n').filter(Boolean).map(line => {
        const [title, description] = line.split('|').map(s => s.trim());
        return { title, description: description || title };
      });
    }
  } catch (err) {
    toast('Invalid task format. Please use JSON array or Title | Description format.', 'error');
    return;
  }

  const resultEl = document.getElementById('batchResult');
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const result = await api('/api/v1/tasks/batch', { method: 'POST', body: { tasks, defaults } });
    const created = result.created || [];
    const errors = result.errors || [];
    resultEl.innerHTML = `
      <div class="card" style="margin-bottom:var(--space-4);border-color:var(--color-success)">
        <div class="card-title" style="color:var(--color-success);margin-bottom:var(--space-3)">${created.length} task${created.length !== 1 ? 's' : ''} created successfully</div>
        ${errors.length ? `<p style="font-size:var(--text-sm);color:var(--color-error)">${errors.length} error${errors.length !== 1 ? 's' : ''}: ${errors.map(err => esc(typeof err === 'string' ? err : err.error || JSON.stringify(err))).join(', ')}</p>` : ''}
        ${created.length ? `<div style="display:flex;flex-wrap:wrap;gap:var(--space-2);margin-top:var(--space-3)">${created.map(t => `<a href="#/task/${t.id}" style="color:var(--color-primary);font-size:var(--text-xs)">#${t.id}</a>`).join('')}</div>` : ''}
      </div>
    `;
    toast(`Created ${created.length} tasks!`, 'success');
  } catch (err) {
    resultEl.innerHTML = `<div class="empty-state"><p>Error: ${err.message}</p></div>`;
    toast(err.message, 'error');
  }
}

                <td style="font-weight:500">${esc(u.filename || u.original_filename || '—')}</td>
                <td style="font-size:var(--text-xs)">${esc(u.content_type || '—')}</td>
                <td>${u.file_size ? (u.file_size / 1024).toFixed(1) + ' KB' : '—'}</td>
                <td><span class="badge badge-${u.status === 'complete' ? 'completed' : u.status === 'pending' ? 'submitted' : 'open'}">${u.status || 'pending'}</span></td>
                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                <td>${u.status !== 'complete' ? `<button class="btn btn-ghost btn-sm" onclick="markUploadComplete(${u.id})">Mark Complete</button>` : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : '<div class="empty-state"><p>No uploads yet</p></div>'}
    `, 'file-upload');
  } catch (err) {
    appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'file-upload');
  }
}

async function handlePresignRequest(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = { filename: fd.get('filename'), content_type: fd.get('content_type') || 'application/octet-stream' };
  if (fd.get('task_id')) body.task_id = parseInt(fd.get('task_id'));

  const resultEl = document.getElementById('presignResult');
  try {
    const result = await api('/api/v1/uploads/presign', { method: 'POST', body });
    resultEl.innerHTML = `
      <div class="card" style="margin-top:var(--space-4);border-color:var(--color-success)">
        <div class="card-title" style="color:var(--color-success);margin-bottom:var(--space-2)">Upload URL Ready</div>
        <div style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2)">Upload ID: ${result.upload_id}</div>
        <div class="code-block" style="word-break:break-all;font-size:11px">${esc(result.upload_url || 'No URL (simulated)')}</div>
        <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3)">
          <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText('${esc(result.upload_url || '')}');toast('Copied!','success')">Copy URL</button>
          <button class="btn btn-ghost btn-sm" onclick="markUploadComplete(${result.upload_id});renderFileUpload()">Mark Complete</button>
        </div>
      </div>
    `;
  } catch (err) {
    resultEl.innerHTML = `<div class="empty-state" style="padding:var(--space-4)"><p>Error: ${err.message}</p></div>`;
  }
}

async function markUploadComplete(id) {
  try {
    await api(`/api/v1/uploads/${id}/complete`, { method: 'POST' });
    toast('Upload marked as complete', 'success');
    renderFileUpload();
  } catch (err) { toast(err.message, 'error'); }
}

// ─── Analytics Dashboard ──────────────────────────────────────────────
async function renderAnalytics() {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'analytics');

  try {
    const [trends, categories, forecasting] = await Promise.all([
      api('/api/v1/admin/analytics/trends?days=30').catch(() => ({ daily: [] })),
      api('/api/v1/admin/analytics/categories').catch(() => []),
      api('/api/v1/admin/analytics/forecasting').catch(() => ({})),
    ]);

    const daily = trends.daily || trends || [];
    const cats = categories.categories || categories || [];
    const f = forecasting.forecasts || forecasting || {};

    const maxTasks = Math.max(1, ...daily.map(d => d.task_count || d.tasks || 0));
    const maxCatCount = Math.max(1, ...cats.map(c => c.count || 0));

    appShell(`
      <h1 class="page-title">Analytics</h1>
      <p class="page-desc">Platform performance over the last 30 days</p>

      ${Object.keys(f).length ? `
        <h2 style="font-size:var(--text-base);font-weight:600;margin-bottom:var(--space-3)">Forecasts</h2>
        <div class="stats-grid" style="margin-bottom:var(--space-6)">
          ${Object.entries(f).slice(0, 4).map(([k, v]) => `
            <div class="stat-card">
              <div class="stat-label">${k.replace(/_/g,' ')}</div>
              <div class="stat-value" style="font-size:var(--text-lg)">${typeof v === 'number' ? (k.includes('revenue') || k.includes('amount') ? '$' + v.toFixed(2) : Math.round(v)) : v}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);">
        ${daily.length ? `
          <div class="card">
            <div class="card-header"><div class="card-title">Daily Tasks (30 days)</div></div>
            <div class="bar-chart">
              ${daily.slice(-14).map(d => {
                const count = d.task_count || d.tasks || 0;
                const pct = Math.round((count / maxTasks) * 100);
                const label = d.date ? d.date.slice(5) : d.day || '—';
                return `
                  <div class="bar-row">
                    <span class="bar-label">${label}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                    <span class="bar-value">${count}</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        ` : '<div class="card"><div class="card-title">No trend data available</div></div>'}

        ${cats.length ? `
          <div class="card">
            <div class="card-header"><div class="card-title">Tasks by Category</div></div>
            <div class="bar-chart">
              ${cats.slice(0, 10).map(c => {
                const count = c.count || 0;
                const pct = Math.round((count / maxCatCount) * 100);
                return `
                  <div class="bar-row">
                    <span class="bar-label">${(c.category || c.name || '—').replace(/_/g,' ')}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                    <span class="bar-value">${count}</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        ` : '<div class="card"><div class="card-title">No category data available</div></div>'}
      </div>

      ${daily.length ? `
        <div class="card" style="margin-top:var(--space-6)">
          <div class="card-header"><div class="card-title">Daily Data Table</div></div>
          <table class="data-table">
            <thead>
              <tr><th>Date</th><th>Tasks</th><th>New Users</th><th>Revenue</th></tr>
            </thead>
            <tbody>
              ${daily.slice(-14).map(d => `
                <tr>
                  <td>${d.date || d.day || '—'}</td>
                  <td>${d.task_count || d.tasks || 0}</td>
                  <td>${d.new_users || d.users || 0}</td>
                  <td>$${((d.revenue || d.amount || 0)).toFixed(2)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      ` : ''}
    `, 'analytics');
  } catch (err) {
    appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'analytics');
  }
}

// ─── Quality Review Dashboard ─────────────────────────────────────────
async function renderQualityDashboard() {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'quality-review');

  try {
    const data = await api('/api/v1/tasks?status=submitted&per_page=50');
    const tasks = data.tasks || [];

    appShell(`
      <h1 class="page-title">Quality Review</h1>
      <p class="page-desc">${tasks.length} submitted task${tasks.length !== 1 ? 's' : ''} pending review</p>

      <div id="qualityList">
        ${tasks.length ? `
          <div style="display:flex;flex-direction:column;gap:var(--space-3)">
            ${tasks.map(t => `
              <div class="card" id="quality-task-${t.id}">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap">
                  <div>
                    <div style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-1)">
                      <a href="#/task/${t.id}" style="color:var(--color-primary)">${esc(t.title)}</a>
                    </div>
                    <div style="font-size:var(--text-xs);color:var(--color-text-muted)">
                      ${icons.dollar} $${Number(t.budget_amount).toFixed(2)} &nbsp;·&nbsp; ${t.category.replace(/_/g,' ')} &nbsp;·&nbsp; #${t.id}
                    </div>
                  </div>
                  <div style="display:flex;gap:var(--space-2)">
                    <button class="btn btn-secondary btn-sm" onclick="runQualityReview(${t.id})">Run Review</button>
                    <button class="btn btn-primary btn-sm" onclick="completeTask(${t.id})">Approve</button>
                  </div>
                </div>
                <div id="qr-result-${t.id}"></div>
              </div>
            `).join('')}
          </div>
        ` : '<div class="empty-state"><p>No submitted tasks pending review</p></div>'}
      </div>
    `, 'quality-review');
  } catch (err) {
    appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'quality-review');
  }
}

async function runQualityReview(taskId) {
  const resultEl = document.getElementById(`qr-result-${taskId}`);
  if (!resultEl) return;
  resultEl.innerHTML = '<div class="loading" style="padding:var(--space-3)"><div class="spinner"></div></div>';

  try {
    const qr = await api(`/api/v1/tasks/${taskId}/quality-review`, { method: 'POST' });
    const score = qr.score || 0;
    const level = score >= 0.7 ? 'high' : score >= 0.4 ? 'medium' : 'low';
    const flags = qr.flags || [];
    resultEl.innerHTML = `
      <div class="quality-review-card">
        <div class="quality-score ${level}">${Math.round(score * 100)}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-1)">
            <span style="font-size:var(--text-sm);font-weight:600">Quality Score: ${Math.round(score * 100)}%</span>
            <span class="badge badge-${level === 'high' ? 'completed' : level === 'medium' ? 'submitted' : 'disputed'}">${qr.recommendation || level}</span>
          </div>
          ${flags.length ? `<div style="font-size:var(--text-xs);color:var(--color-text-muted)">Flags: ${flags.map(f => esc(f)).join(', ')}</div>` : ''}
          ${qr.details ? `<div style="font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-1)">${esc(qr.details)}</div>` : ''}
        </div>
      </div>
    `;
  } catch (err) {
    resultEl.innerHTML = `<div style="font-size:var(--text-xs);color:var(--color-error);padding:var(--space-3)">Error: ${err.message}</div>`;
  }
}

// ─── Admin Verifications ──────────────────────────────────────────────
async function renderAdminVerifications() {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'admin-verifications');

  try {
    const data = await api('/api/v1/admin/verifications');
    const verifications = data.verifications || data || [];

    appShell(`
      <h1 class="page-title">Worker Verifications</h1>
      <p class="page-desc">${verifications.length} verification request${verifications.length !== 1 ? 's' : ''}</p>

      <table class="data-table">
        <thead>
          <tr><th>Worker</th><th>Type</th><th>Status</th><th>Document Ref</th><th>Submitted</th><th></th></tr>
        </thead>
        <tbody>
          ${verifications.map(v => `
            <tr>
              <td style="font-weight:500">${esc(v.name || v.email || 'User #' + v.user_id)}</td>
              <td><span class="badge badge-open">${(v.verification_type || '—').replace('_',' ')}</span></td>
              <td>
                <span class="verify-badge ${v.status === 'approved' ? 'approved' : v.status === 'pending' ? 'pending' : 'rejected'}">
                  ${icons.shield} ${v.status}
                </span>
              </td>
              <td style="font-size:var(--text-xs);max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(v.document_reference || '—')}</td>
              <td>${new Date(v.created_at).toLocaleDateString()}</td>
              <td>
                ${v.status === 'pending' ? `
                  <div style="display:flex;gap:var(--space-1)">
                    <button class="btn btn-primary btn-sm" onclick="adminVerifyAction(${v.id},'approved')">Approve</button>
                    <button class="btn btn-danger btn-sm" onclick="adminVerifyAction(${v.id},'rejected')">Reject</button>
                  </div>
                ` : ''}
              </td>
            </tr>
          `).join('')}
          ${!verifications.length ? '<tr><td colspan="6" style="text-align:center;color:var(--color-text-faint);padding:var(--space-6)">No verification requests</td></tr>' : ''}
        </tbody>
      </table>
    `, 'admin-verifications');
  } catch (err) {
    appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'admin-verifications');
  }
}

async function adminVerifyAction(id, status) {
  const notes = prompt(`${status === 'approved' ? 'Approval' : 'Rejection'} notes (optional):`) || '';
  try {
    await api(`/api/v1/admin/verifications/${id}`, { method: 'PUT', body: { status, admin_notes: notes } });
    toast(`Verification ${status}`, 'success');
    renderAdminVerifications();
  } catch (err) { toast(err.message, 'error'); }
}

// ─── Init ─────────────────────────────────────────────────────────────
render();

  </script>
</body>
