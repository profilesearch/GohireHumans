  storedToken = localStorage.getItem('ghh_token');

// --- Theme ---
function setTheme(t) { state.theme = t; document.documentElement.setAttribute('data-theme', t); }
setTheme(state.theme);

// --- API Client ---
async function api(path, opts = {}) {
  const url = `${API}${path}`;
  const headers = { 'X-Requested-With': 'XMLHttpRequest' };
  if (opts.body) headers['Content-Type'] = 'application/json';
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  let res;
  try {
    res = await fetch(url, {
      method: opts.method || 'GET',
      headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
  } catch (networkErr) {
    throw new Error('Network error — please check your connection.');
  }
  let data;
  try {
    data = await res.json();
  } catch {
    throw new Error(`Server error (${res.status})`);
  }
  if (!res.ok) throw new Error(data?.error || `Request failed (${res.status})`);
  return data;
}

// --- Toast ---
function toast(msg, type = 'info') {
  const el = document.createElement('div'); el.className = `toast toast-${type}`; el.textContent = msg;

function selectRole(role) {
  document.getElementById('role-card-hire').classList.toggle('selected', role === 'ai_client');
  document.getElementById('role-card-work').classList.toggle('selected', role === 'worker');
  const f = document.getElementById('roleField'); if (f) f.value = role;
}
async function handleAuth(e, mode) {
  e.preventDefault(); const form = new FormData(e.target); const body = Object.fromEntries(form);
  try {
    const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
    const data = await api(endpoint, { method: 'POST', body });
    const { token, ...user } = data;
    state.user = user; state.token = token;
    try {
      localStorage.setItem('ghh_token', token);
      localStorage.setItem('ghh_user', JSON.stringify(user));
    } catch(e) {}
    toast(mode === 'login' ? 'Welcome back!' : 'Account created!', 'success'); navigate('#/');
  } catch (err) { toast(err.message, 'error'); }
}
function logout() {
  api('/auth/logout', { method: 'POST' }).catch(() => {});
  state.user = null;
  state.token = null;
  state.sidebarOpen = false;
  try {
    localStorage.removeItem('ghh_token');
    localStorage.removeItem('ghh_user');
  } catch(e) {}
  if (window.location.hash === '#/' || window.location.hash === '') render(); else navigate('#/');
}
function esc(s) { return s ? s.replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function safeParseJSON(str, fallback = []) {
  try { return JSON.parse(str || JSON.stringify(fallback)); }
  catch { return fallback; }
}

// --- Tasks List ---
async function renderTasks() {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'tasks');
  const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
  const status = params.get('status') || ''; const category = params.get('category') || '';
  try {
    let url = '/api/v1/tasks?per_page=50';
    if (status) url += `&status=${status}`; if (category) url += `&category=${category}`;
    const data = await api(url); const tasks = data.tasks || [];
    const categories = ['phone_call','in_person_errand','document_signing','media_capture','expert_review','data_entry','research','writing','translation','customer_support','testing','inspection','delivery','other'];
    const statuses = ['draft','open','reserved','in_progress','submitted','completed','disputed','canceled'];
    appShell(`
      <h1 class="page-title">${state.user.role === 'worker' ? 'Browse Tasks' : state.user.role === 'admin' ? 'All Tasks' : 'My Tasks'}</h1>
      <p class="page-desc">${data.total} task${data.total !== 1 ? 's' : ''} found</p>
      <div class="filters-bar">
        <select class="select" onchange="filterTasks('status', this.value)"><option value="">All statuses</option>${statuses.map(s => `<option value="${s}" ${status===s?'selected':''}>${s.replace('_',' ')}</option>`).join('')}</select>
        <select class="select" onchange="filterTasks('category', this.value)"><option value="">All categories</option>${categories.map(c => `<option value="${c}" ${category===c?'selected':''}>${c.replace(/_/g,' ')}</option>`).join('')}</select>
        ${state.user.role === 'ai_client' ? `<button class="btn btn-primary btn-sm" onclick="navigate('#/create-task')">Create Task</button>` : ''}
      </div>
      <div class="task-list">${tasks.length ? tasks.map(t => taskCard(t)).join('') : '<div class="empty-state"><p>No tasks match your filters</p></div>'}</div>
    `, 'tasks');
  } catch (err) { appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'tasks'); }
}
function filterTasks(key, val) {
  const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
  if (val) params.set(key, val); else params.delete(key);
  const qs = params.toString(); window.location.hash = `/tasks${qs ? '?' + qs : ''}`;
}

// --- Task Detail ---
async function renderTaskDetail(id) {
  id = parseInt(id, 10);
  if (isNaN(id)) { appShell('<div class="empty-state"><p>Invalid task ID.</p></div>', 'tasks'); return; }
  appShell('<div class="loading"><div class="spinner"></div></div>', 'tasks');
  try {
    const task = await api(`/api/v1/tasks/${id}`);
    const skills = safeParseJSON(task.required_skills, []);
    const role = state.user.role; const isClient = task.client_id === state.user.id; const isWorker = task.worker_id === state.user.id;
    let actions = '';
    if (role === 'worker' && task.status === 'open') actions = `<button class="btn btn-primary" onclick="acceptTask(${id})">Accept Task</button>`;
    if (role === 'worker' && isWorker && task.status === 'in_progress') actions = `<button class="btn btn-primary" onclick="showSubmitModal(${id})">Submit Deliverables</button>`;
    if ((isClient || role === 'admin') && task.status === 'submitted') actions = `<button class="btn btn-primary" onclick="completeTask(${id})">Approve &amp; Complete</button><button class="btn btn-danger btn-sm" onclick="disputeTask(${id})">Dispute</button>`;
    if ((isClient || role === 'admin') && ['open','in_progress','reserved'].includes(task.status)) actions += `<button class="btn btn-ghost btn-sm" onclick="cancelTask(${id})">Cancel</button>`;
    if (task.status === 'completed' && (isClient || isWorker)) {
      const alreadyRated = (task.ratings || []).some(r => r.from_user_id === state.user.id);
      if (!alreadyRated) actions += `<button class="btn btn-secondary btn-sm" onclick="showRateModal(${id})">Rate</button>`;
    }
    if (role === 'worker' && !isWorker) actions += `<button class="btn btn-ghost btn-sm" onclick="flagEntity('task', ${id})">Report</button>`;
    appShell(`
      <div class="detail-header">
        <button class="detail-back" onclick="navigate('#/tasks')">${icons.back} Back</button>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap">
          <div>
            <div class="detail-title">${esc(task.title)}</div>
            <div class="detail-meta">
              <span class="badge badge-${task.status}">${task.status.replace('_',' ')}</span>
              <span>${icons.dollar} $${Number(task.budget_amount).toFixed(2)} ${task.budget_type === 'hourly' ? '/hr' : 'flat'}</span>
              <span>${icons.location} ${task.location_type === 'remote' ? 'Remote' : esc(task.location_detail || task.location_type)}</span>
            </div>
          </div>
          <div style="display:flex;gap:var(--space-2);flex-wrap:wrap">${actions}</div>
        </div>
      </div>
      <div class="detail-body"><div class="detail-content">
        <div class="card" style="margin-bottom:var(--space-4)"><div class="card-header"><div class="card-title">Description</div></div>
          <div style="font-size:var(--text-sm);line-height:1.7;white-space:pre-wrap">${esc(task.description)}</div>
        </div>
        ${skills.length ? `<div class="card" style="margin-bottom:var(--space-4)"><div class="card-header"><div class="card-title">Required Skills</div></div><div style="display:flex;gap:var(--space-2);flex-wrap:wrap">${skills.map(s => `<span class="badge badge-open">${s.replace(/_/g,' ')}</span>`).join('')}</div></div>` : ''}
        ${task.deliverables_text ? `<div class="card" style="margin-bottom:var(--space-4)"><div class="card-header"><div class="card-title">Deliverables</div></div><div style="font-size:var(--text-sm);white-space:pre-wrap">${esc(task.deliverables_text)}</div></div>` : ''}
        ${(task.ratings || []).length ? `<div class="card"><div class="card-header"><div class="card-title">Ratings</div></div>${task.ratings.map(r => `<div style="padding:var(--space-3) 0;border-bottom:1px solid var(--color-divider)"><div class="stars">${[1,2,3,4,5].map(i => `<span class="star ${i <= r.rating ? 'filled' : ''}">${i <= r.rating ? icons.star : icons.starEmpty}</span>`).join('')}</div><div style="font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-1)">User #${r.from_user_id}</div></div>`).join('')}</div>` : ''}
      </div>
      <div class="detail-sidebar"><div class="card">
        <div class="card-title" style="margin-bottom:var(--space-3)">Task Details</div>
        <div style="font-size:var(--text-xs);display:flex;flex-direction:column;gap:var(--space-2)">
          <div><span style="color:var(--color-text-faint)">Posted by:</span> ${esc(task.client_name)}</div>
          <div><span style="color:var(--color-text-faint)">Category:</span> ${task.category.replace(/_/g,' ')}</div>
          <div><span style="color:var(--color-text-faint)">Created:</span> ${new Date(task.created_at).toLocaleDateString()}</div>
          ${task.worker ? `<div><span style="color:var(--color-text-faint)">Worker:</span> ${esc(task.worker.name)}</div>` : ''}
        </div>
      </div></div></div>
    `, 'tasks');
  } catch (err) { appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'tasks'); }
}

// --- Task Actions ---
async function acceptTask(id) { if (!confirm('Accept this task?')) return; try { await api(`/api/v1/tasks/${id}/accept`, { method: 'POST' }); toast('Task accepted!', 'success'); renderTaskDetail(id); } catch (err) { toast(err.message, 'error'); } }
async function cancelTask(id) { if (!confirm('Cancel this task?')) return; try { await api(`/api/v1/tasks/${id}/cancel`, { method: 'POST' }); toast('Task canceled', 'success'); renderTaskDetail(id); } catch (err) { toast(err.message, 'error'); } }
async function completeTask(id) { if (!confirm('Approve and complete?')) return; try { await api(`/api/v1/tasks/${id}/complete`, { method: 'POST' }); toast('Task completed!', 'success'); renderTaskDetail(id); } catch (err) { toast(err.message, 'error'); } }
async function disputeTask(id) { const reason = prompt('Reason for dispute:'); if (!reason) return; try { await api(`/api/v1/tasks/${id}/dispute`, { method: 'POST', body: { reason } }); toast('Task disputed', 'info'); renderTaskDetail(id); } catch (err) { toast(err.message, 'error'); } }
async function flagEntity(type, id) { const reason = prompt(`Why are you flagging this ${type}?`); if (!reason) return; try { await api('/api/v1/flags', { method: 'POST', body: { entity_type: type, entity_id: id, reason } }); toast('Report submitted.', 'success'); } catch (err) { toast(err.message, 'error'); } }
function showSubmitModal(taskId) {
  const overlay = document.createElement('div'); overlay.className = 'modal-overlay active';
  overlay.innerHTML = `<div class="modal"><div class="modal-title">Submit Deliverables</div><form id="submitForm"><div class="form-group"><label class="label">Description of completed work</label><textarea class="textarea" name="text" rows="6" required></textarea></div><div class="form-group"><label class="label">File URLs (one per line, optional)</label><textarea class="textarea" name="files" rows="3"></textarea></div><div class="modal-actions"><button type="button" class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button type="submit" class="btn btn-primary">Submit</button></div></form></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#submitForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const rawFiles = fd.get('files').split('\n').filter(u => u.trim());
    const files = rawFiles.map(u => u.trim()).filter(Boolean);
    const validUrls = files.filter(u => {
      try { const url = new URL(u); return ['http:', 'https:'].includes(url.protocol); }
      catch { return false; }
    });
    if (files.length > 0 && files.length !== validUrls.length) {
      toast('All file URLs must be valid http/https URLs.', 'error'); return;
    }
    try { await api(`/api/v1/tasks/${taskId}/submit`, { method: 'POST', body: { text: fd.get('text'), files: validUrls } }); overlay.remove(); toast('Submitted!', 'success'); renderTaskDetail(taskId); } catch (err) { toast(err.message, 'error'); }
  };
}
function showRateModal(taskId) {
  let selectedRating = 0;
  const overlay = document.createElement('div'); overlay.className = 'modal-overlay active';
  overlay.innerHTML = `<div class="modal"><div class="modal-title">Rate this experience</div><div class="stars" id="ratingStars" style="font-size:24px;margin-bottom:var(--space-4);justify-content:center">${[1,2,3,4,5].map(i => `<span class="star" data-rating="${i}" style="cursor:pointer;font-size:24px">${icons.starEmpty}</span>`).join('')}</div><div class="modal-actions"><button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn btn-primary" id="submitRating">Submit</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('#ratingStars .star').forEach(star => { star.onclick = () => { selectedRating = parseInt(star.dataset.rating); overlay.querySelectorAll('#ratingStars .star').forEach((s, i) => { s.innerHTML = i < selectedRating ? icons.star : icons.starEmpty; s.classList.toggle('filled', i < selectedRating); }); }; });
  overlay.querySelector('#submitRating').onclick = async () => { if (!selectedRating) return toast('Select a rating', 'error'); try { await api(`/api/v1/tasks/${taskId}/rate`, { method: 'POST', body: { rating: selectedRating, review: '' } }); overlay.remove(); toast('Rating submitted!', 'success'); renderTaskDetail(taskId); } catch (err) { toast(err.message, 'error'); } };
}

// --- Payments (Real Stripe integration with graceful simulation fallback) ---

// Handle deposit success/cancel URL params
function checkDepositStatus() {
  const hash = window.location.hash;
  if (hash.includes('deposit=success')) {
    toast('Deposit confirmed! Your balance has been updated.', 'success');
    window.location.hash = '#/payments';
  } else if (hash.includes('deposit=canceled')) {
    toast('Deposit canceled.', 'info');
    window.location.hash = '#/payments';
  } else if (hash.includes('connect=complete')) {
    toast('Bank account setup complete! Checking status...', 'success');
    window.location.hash = '#/payments';
  } else if (hash.includes('connect=refresh')) {
    toast('Please complete your bank account setup.', 'info');
    window.location.hash = '#/payments';
  }
}

async function handleDeposit(e) {
  e.preventDefault();
  const form = e.target;
  const amount = parseFloat(form.deposit_amount.value);
  if (!amount || amount < 1) { toast('Minimum deposit is $1.00', 'error'); return; }
  const btn = form.querySelector('button[type="submit"]');
  btn.disabled = true; btn.textContent = 'Processing...';
  try {
    const res = await api('/api/v1/payments/create-checkout', { method: 'POST', body: { amount, currency: 'usd' } });
    if (res.payment_url) {
      if (res.mode === 'simulated') {
        toast(`$${amount.toFixed(2)} added to your balance (simulation mode)`, 'success');
        renderPayments();
      } else {
        // Redirect to Stripe Checkout
        window.location.href = res.payment_url;
      }
    }
  } catch (err) { toast('Deposit failed: ' + err.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Deposit'; }
}

async function handleConnectOnboard() {
  const btn = document.getElementById('connect-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Setting up...'; }
  try {
    const res = await api('/api/v1/payments/connect-onboard', { method: 'POST', body: {} });
    if (res.onboarding_url) {
      if (res.mode === 'simulated') {
        toast('Bank account connected (simulation mode)', 'success');
        renderPayments();
      } else {
        window.location.href = res.onboarding_url;
      }
    }
  } catch (err) { toast('Setup failed: ' + err.message, 'error'); if (btn) { btn.disabled = false; btn.textContent = 'Connect Bank Account'; } }
}

async function handlePayoutRequest(e) {
  e.preventDefault();
  const form = e.target;
  const amount = parseFloat(form.payout_amount.value);
  if (!amount || amount <= 0) { toast('Enter a valid amount', 'error'); return; }
  const btn = form.querySelector('button[type="submit"]');
  btn.disabled = true; btn.textContent = 'Processing...';
  try {
    const res = await api('/api/v1/payments/request-payout', { method: 'POST', body: { amount } });
    toast(`Payout of $${amount.toFixed(2)} requested successfully`, 'success');
    renderPayments();
  } catch (err) { toast('Payout failed: ' + err.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Request Payout'; }
}

async function renderPayments() {
  appShell('<div class="loading"><div class="spinner"></div></div>', 'payments');
  checkDepositStatus();
  try {
    const role = state.user.role;
    let fetches = [api('/auth/me'), api('/api/v1/payments/ledger')];
    if (role === 'worker') fetches.push(api('/api/v1/payments/connect-status').catch(() => ({ connected: false, status: 'not_started' })));
    if (role === 'worker') fetches.push(api('/api/v1/payments/payout-history').catch(() => []));
    const results = await Promise.all(fetches);
    const profile = results[0]; const ledger = results[1];
    const connectStatus = role === 'worker' ? results[2] : null;
    const payoutHistory = role === 'worker' ? results[3] : null;
    const p = profile.profile || {};

    let header = '';
    let actionSection = '';

    if (role === 'ai_client') {
      header = `<div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Credit Balance</div><div class="stat-value">$${(p.credit_balance || 0).toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value">$${(p.total_spent || 0).toFixed(2)}</div></div>
      </div>`;
      actionSection = `
        <div class="card" style="margin-bottom:var(--space-6)">
          <div class="card-header"><div class="card-title">Add Funds</div></div>
          <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">Deposit funds to your account to create and pay for tasks.</p>
          <form onsubmit="handleDeposit(event)" style="display:flex;gap:var(--space-3);align-items:flex-end;flex-wrap:wrap">
            <div class="form-group" style="margin-bottom:0;flex:1;min-width:160px">
              <label class="label">Amount (USD)</label>
              <input class="input" type="number" name="deposit_amount" min="1" step="0.01" placeholder="25.00" required>
            </div>
            <button type="submit" class="btn btn-primary">Deposit</button>
          </form>
        </div>`;
    } else if (role === 'worker') {
      header = `<div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Earned</div><div class="stat-value">$${(p.estimated_earnings || 0).toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Available to Withdraw</div><div class="stat-value">$${(p.withdrawable_balance || 0).toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Tasks Completed</div><div class="stat-value">${p.total_tasks_completed || 0}</div></div>
      </div>`;

      // Connect account section
      let connectSection = '';
      const isConnected = connectStatus && connectStatus.connected;
      const isPending = connectStatus && connectStatus.status === 'pending';
      if (!isConnected && !isPending) {
        connectSection = `
          <div class="card" style="margin-bottom:var(--space-4);border-left:3px solid var(--color-warning)">
            <div class="card-header"><div class="card-title">Connect Your Bank Account</div></div>
            <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">To receive payouts, connect your bank account through our secure payment partner Stripe.</p>
            <button id="connect-btn" class="btn btn-primary" onclick="handleConnectOnboard()">Connect Bank Account</button>
          </div>`;
      } else if (isPending) {
        connectSection = `
          <div class="card" style="margin-bottom:var(--space-4);border-left:3px solid var(--color-warning)">
            <div class="card-header"><div class="card-title">Bank Account Setup Pending</div></div>
            <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">Your account setup is not yet complete. Please finish the onboarding process.</p>
            <button id="connect-btn" class="btn btn-primary" onclick="handleConnectOnboard()">Complete Setup</button>
          </div>`;
      } else {
        connectSection = `
          <div class="card" style="margin-bottom:var(--space-4);border-left:3px solid var(--color-success)">
            <div class="card-header"><div class="card-title">Bank Account Connected</div></div>
            <p style="font-size:var(--text-sm);color:var(--color-text-muted)">Your payout account is active and ready to receive payments.${connectStatus.mode === 'simulated' ? ' <span class="badge badge-open">Simulation</span>' : ''}</p>
          </div>`;
      }

      // Payout request section
      const canPayout = (p.withdrawable_balance || 0) > 0 && isConnected;
      let payoutSection = '';
      if (isConnected) {
        payoutSection = `
          <div class="card" style="margin-bottom:var(--space-4)">
            <div class="card-header"><div class="card-title">Request Payout</div></div>
            ${canPayout ? `
              <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">Request a transfer of your available balance to your connected bank account.</p>
              <form onsubmit="handlePayoutRequest(event)" style="display:flex;gap:var(--space-3);align-items:flex-end;flex-wrap:wrap">
                <div class="form-group" style="margin-bottom:0;flex:1;min-width:160px">
                  <label class="label">Amount (USD)</label>
                  <input class="input" type="number" name="payout_amount" min="0.01" max="${(p.withdrawable_balance || 0).toFixed(2)}" step="0.01" placeholder="${(p.withdrawable_balance || 0).toFixed(2)}" required>
                </div>
                <button type="submit" class="btn btn-primary">Request Payout</button>
              </form>
            ` : `<p style="font-size:var(--text-sm);color:var(--color-text-faint)">No funds available for withdrawal.</p>`}
          </div>`;
      }

      // Payout history
      let payoutHistorySection = '';
      if (payoutHistory && payoutHistory.length > 0) {
        const statusBadge = (s) => {
          const map = { pending: 'open', processing: 'reserved', completed: 'completed', failed: 'canceled', rejected: 'canceled' };
          return `<span class="badge badge-${map[s] || 'open'}">${s}</span>`;
        };
        payoutHistorySection = `
          <h2 style="font-size:var(--text-lg);font-weight:600;margin:var(--space-6) 0 var(--space-4)">Payout History</h2>
          <table class="data-table"><thead><tr><th>Date</th><th>Amount</th><th>Status</th></tr></thead><tbody>
            ${payoutHistory.map(pr => `<tr><td>${new Date(pr.created_at).toLocaleDateString()}</td><td style="font-variant-numeric:tabular-nums">$${Math.abs(pr.amount).toFixed(2)}</td><td>${statusBadge(pr.status)}</td></tr>`).join('')}
          </tbody></table>`;
      }

      actionSection = connectSection + payoutSection + payoutHistorySection;
    }

    // Ledger type badge helper
    const ledgerBadge = (type) => {
      const positive = ['credit', 'fund_add', 'fund_add_confirmed', 'payout_refund'];
      const neutral = ['checkout_pending'];
      if (positive.includes(type)) return 'completed';
      if (neutral.includes(type)) return 'reserved';
      return 'open';
    };
    const ledgerSign = (type) => {
      const positive = ['credit', 'fund_add', 'fund_add_confirmed', 'payout_refund'];
      return positive.includes(type) ? '+' : '-';
    };

    appShell(`
      <h1 class="page-title">${role === 'ai_client' ? 'Balance & Billing' : 'Earnings & Payouts'}</h1>
      ${header}
      ${actionSection}
      <h2 style="font-size:var(--text-lg);font-weight:600;margin-bottom:var(--space-4)">Transaction History</h2>
      <table class="data-table"><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Balance</th><th>Description</th></tr></thead><tbody>
        ${ledger.map(e => `<tr><td>${new Date(e.created_at).toLocaleDateString()}</td><td><span class="badge badge-${ledgerBadge(e.entry_type)}">${e.entry_type.replace(/_/g, ' ')}</span></td><td style="font-variant-numeric:tabular-nums">${ledgerSign(e.entry_type)}$${Math.abs(e.amount).toFixed(2)}</td><td>${e.balance_after != null ? '$' + e.balance_after.toFixed(2) : '—'}</td><td style="font-size:var(--text-xs);color:var(--color-text-muted)">${esc(e.description || '')}</td></tr>`).join('')}
        ${!ledger.length ? '<tr><td colspan="5" style="text-align:center;color:var(--color-text-faint);padding:var(--space-6)">No transactions yet</td></tr>' : ''}
      </tbody></table>
    `, 'payments');
  } catch (err) { appShell(`<div class="empty-state"><p>Error: ${err.message}</p></div>`, 'payments'); }
}

async function updateProfile(e) {
  e.preventDefault(); const fd = new FormData(e.target); const body = Object.fromEntries(fd);
  if (body.skills_raw) { body.skills = body.skills_raw.split(',').map(s => s.trim()).filter(Boolean); delete body.skills_raw; }
  if (body.hourly_rate_min) body.hourly_rate_min = parseFloat(body.hourly_rate_min);
  if (body.hourly_rate_max) body.hourly_rate_max = parseFloat(body.hourly_rate_max);
  try { await api('/profile', { method: 'PUT', body }); toast('Profile updated', 'success'); } catch (err) { toast(err.message, 'error'); }
}

    // ---- Init ----
function render() {
  const hash = location.hash.slice(1) || '/';
  const [path, ...rest] = hash.split('?');
  const segments = path.split('/').filter(Boolean);

  // Public routes
  if (path === '/') { if (state.user && state.token) return renderDashboard(); return renderLanding(); }
  if (path === '/auth' || path === '/login') return renderAuth('login');
  if (path === '/register') return renderAuth('register');
  if (path === '/terms') return renderTerms();
  if (path === '/guidelines') return renderGuidelines();

  // Auth required
  if (!state.user || !state.token) { location.hash = '#/auth'; return; }

  // User routes
  if (path === '/dashboard') return renderDashboard();
  if (path === '/tasks') return renderTasks();
  if (path.match(/^\/task\/\d+$/)) return renderTaskDetail(segments[1]);
  if (path === '/create' || path === '/create-task') return renderCreateTask();
  if (path === '/developer') return renderDeveloperSettings();
  if (path === '/playground') return renderPlayground();
  if (path === '/payments') return renderPayments();
  if (path === '/profile') return renderProfile();
  if (path === '/notifications') return renderNotifications();
  if (path === '/matching') return renderMatching();
  if (path === '/verification') return renderVerification();

  // Admin routes
  if (path === '/admin') return renderAdminDashboard();
  if (path === '/admin/tasks') return renderAdminTasks();
  if (path.match(/^\/admin\/tasks\/\d+$/)) return renderTaskDetail(segments[2]);
  if (path === '/admin/users') return renderAdminUsers();
  if (path === '/admin/flags') return renderAdminFlags();
  if (path === '/admin/audit') return renderAdminAudit();

  // Fallback
  renderDashboard();
}

window.addEventListener('hashchange', render);
render();
