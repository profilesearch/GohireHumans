// ─── State ───────────────────────────────────────────────────
let storedUser = null, storedToken = null;
try {
  storedToken = localStorage.getItem('ghh_token');
  storedUser = JSON.parse(localStorage.getItem('ghh_user') || 'null');
} catch(e) {}

let state = {
  user: storedUser,
  token: storedToken,
  sidebarOpen: false,
  landingMode: 'hire',
  // Cache for public browsing
  categories: null,
};

// Force light theme per design requirements
document.documentElement.setAttribute('data-theme', 'light');

// ─── API Client ───────────────────────────────────────────────
async function api(path, opts = {}) {
  const url = `${API}${path}`;
  const headers = { 'X-Requested-With': 'XMLHttpRequest' };
  if (opts.body) headers['Content-Type'] = 'application/json';
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  let res;
  try {
    res = await fetch(url, {
      method: opts.method || 'GET',
      headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
  } catch (networkErr) {
    throw new Error('Network error — please check your connection.');
  }
  let data;
  try { data = await res.json(); } catch { throw new Error(`Server error (${res.status})`); }
  if (!res.ok) throw new Error(data?.error || `Request failed (${res.status})`);
  return data;
}

// ─── Toast ────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─── Helpers ─────────────────────────────────────────────────
function esc(s) { return s ? String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/&/g,'&amp;') : ''; }
function safeParseJSON(str, fallback = []) {
  try { return JSON.parse(str || JSON.stringify(fallback)); } catch { return fallback; }
}
function stars(rating, total) {
  const r = Math.round(rating || 0);
  const starsHtml = [1,2,3,4,5].map(i => `<span class="star${i <= r ? ' filled' : ''}">${i <= r ? '★' : '☆'}</span>`).join('');
  return `<span class="stars-row">${starsHtml}${total !== undefined ? `<span class="stars-count">(${total})</span>` : ''}</span>`;
}
function formatPrice(service) {
  if (service.pricing_type === 'fixed') return `$${Number(service.price || 0).toFixed(0)}`;
  if (service.pricing_type === 'hourly') return `$${Number(service.hourly_rate || 0).toFixed(0)}/hr`;
  return 'Custom';
}
function formatBudget(job) {
  if (job.budget_type === 'fixed') return `$${Number(job.budget_amount || 0).toFixed(0)} fixed`;
  return `$${Number(job.budget_amount || 0).toFixed(0)}/hr`;
}
function relativeDate(str) {
  if (!str) return '';
  const d = new Date(str), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 2592000) return `${Math.floor(diff/86400)}d ago`;
  return d.toLocaleDateString();
}
function statusBadge(status) {
  const map = {
    active: 'open', paused: 'submitted', removed: 'canceled',
    open: 'open', reviewing: 'reserved', hired: 'in_progress',
    in_progress: 'in_progress', completed: 'completed', disputed: 'disputed',
    canceled: 'canceled', pending: 'reserved', submitted: 'submitted'
  };
  const cls = map[status] || 'draft';
  return `<span class="badge badge-${cls}">${esc(status ? status.replace(/_/g,' ') : 'unknown')}</span>`;
}
function navigate(hash) { window.location.hash = hash; }
function getPath() {
  const h = window.location.hash.slice(1) || '/';
  return h.split('?')[0];
}
function getQuery() {
  const h = window.location.hash;
  const qi = h.indexOf('?');
  return qi >= 0 ? new URLSearchParams(h.slice(qi + 1)) : new URLSearchParams();
}
function requireAuth(redirect) {
  if (!state.user || !state.token) {
    navigate(`#/login?redirect=${encodeURIComponent(redirect)}`);
    return false;
  }
  return true;
}

async function renderServices() {
  const q = getQuery();
  const search = q.get('search') || '';
  const category = q.get('category') || '';
  const minPrice = q.get('min_price') || '';
  const maxPrice = q.get('max_price') || '';
  const page = parseInt(q.get('page') || '1');

  document.getElementById('app').innerHTML = `
    ${renderPublicNav('services')}
    <div class="browse-page">
      <div class="browse-header">
        <h1 class="browse-title">Browse Services</h1>
        <p class="browse-sub">Find skilled professionals for any task</p>
      </div>
      <div class="browse-layout">
        <aside class="browse-sidebar">
          <div class="filter-group">
            <label class="label">Search</label>
            <div style="position:relative">
              <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--color-text-faint)">${I.search}</span>
              <input class="input" id="srv-search" placeholder="Search services..." value="${esc(search)}" style="padding-left:2rem" oninput="debounceFilter()">
            </div>
          </div>
          <div class="filter-group">
            <label class="label">Category</label>
            <select class="select" id="srv-cat" onchange="applyServiceFilters()">
              <option value="">All categories</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="label">Price Range</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)">
              <input class="input" type="number" id="srv-min" placeholder="Min $" value="${esc(minPrice)}" onchange="applyServiceFilters()">
              <input class="input" type="number" id="srv-max" placeholder="Max $" value="${esc(maxPrice)}" onchange="applyServiceFilters()">
            </div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="navigate('#/services')" style="width:100%">Clear filters</button>
          ${state.user ? `<div style="margin-top:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--color-divider)"><button class="btn btn-primary" style="width:100%" onclick="navigate('#/my-services')">Post a Service</button></div>` : `<div style="margin-top:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--color-divider)"><p style="font-size:var(--text-xs);color:var(--color-text-faint);margin-bottom:var(--space-3)">Offer your skills to thousands of clients</p><button class="btn btn-primary" style="width:100%" onclick="navigate('#/register')">Start offering services</button></div>`}
        </aside>
        <div class="browse-content">
          <div id="services-grid" class="browse-grid">
            ${skeletonCards(6)}
          </div>
          <div id="services-pagination" class="pagination"></div>
        </div>
      </div>
    </div>
    ${publicFooter()}`;

  // Load categories
  try {
    const cats = await loadCategories();
    const sel = document.getElementById('srv-cat');
    if (sel) {
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.slug || c.name;
        opt.textContent = c.name;
        if ((c.slug || c.name) === category) opt.selected = true;
        sel.appendChild(opt);
      });
    }
  } catch(e) {}

  // Load services
  await loadServicesGrid(page, { search, category, minPrice, maxPrice });
}

async function loadCategories() {
  if (state.categories) return state.categories;
  try {
    const data = await api('/categories');
    state.categories = Array.isArray(data) ? data : (data.categories || []);
    return state.categories;
  } catch {
    return [
      {name:'Writing', slug:'writing'}, {name:'Design', slug:'design'},
      {name:'Development', slug:'development'}, {name:'Marketing', slug:'marketing'},
      {name:'Research', slug:'research'}, {name:'Data Entry', slug:'data_entry'},
      {name:'Business Calls', slug:'phone_call'}, {name:'Errands', slug:'errand'},
      {name:'Inspections', slug:'inspection'}, {name:'Other', slug:'other'},
    ];

async function loadServicesGrid(page, filters) {
  const grid = document.getElementById('services-grid');
  const pag = document.getElementById('services-pagination');
  if (!grid) return;
  grid.innerHTML = skeletonCards(6);

  let url = `/services?page=${page}&per_page=12`;
  if (filters.search) url += `&search=${encodeURIComponent(filters.search)}`;
  if (filters.category) url += `&category=${encodeURIComponent(filters.category)}`;
  if (filters.minPrice) url += `&min_price=${filters.minPrice}`;
  if (filters.maxPrice) url += `&max_price=${filters.maxPrice}`;

  try {
    const data = await api(url);
    const services = Array.isArray(data) ? data : (data.services || []);
    const total = data.total || services.length;
    const totalPages = Math.ceil(total / 12);

    if (services.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div style="font-size:3rem;margin-bottom:var(--space-4)">🔍</div><p>No services found. Try adjusting your filters.</p></div>`;
    } else {
      grid.innerHTML = services.map(s => serviceCard(s)).join('');
    }

    if (pag && totalPages > 1) {
      const q2 = getQuery();
      pag.innerHTML = Array.from({length:totalPages},(_,i)=>i+1).map(p => {
        q2.set('page', p);
        return `<button class="page-btn ${p===page?'active':''}" onclick="navigate('#/services?${q2}')">${p}</button>`;
      }).join('');
    }
  } catch(err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>Failed to load services: ${esc(err.message)}</p><button class="btn btn-primary btn-sm" onclick="renderServices()">Retry</button></div>`;
  }
}

async function handleOrderService(id) {
  if (!requireAuth(`services/${id}`)) return;
  // Check payment status
  try {
    const status = await api('/payments/status');
    if (!status.employer_ready) {
      const ok = confirm('You need to set up a payment method before ordering. Go to Payments now?');
      if (ok) navigate('#/payments');
      return;
    }
    // Proceed to order
    const ok = confirm('Confirm order? Payment will be placed in escrow until you approve the delivery.');
    if (!ok) return;
    const order = await api(`/services/${id}/order`, { method: 'POST', body: {} });
    toast('Order placed! Payment is in escrow.', 'success');
    navigate(`#/orders/${order.id || order.order_id}`);
  } catch(err) {
    toast(err.message, 'error');
  }
}

async function loadJobsList(page, filters) {
  const list = document.getElementById('jobs-list');
  const pag = document.getElementById('jobs-pagination');
  if (!list) return;
  list.innerHTML = Array(5).fill(0).map(()=>`<div class="skeleton-card" style="height:100px"></div>`).join('');

  let url = `/jobs?page=${page}&per_page=15`;
  if (filters.search) url += `&search=${encodeURIComponent(filters.search)}`;
  if (filters.category) url += `&category=${encodeURIComponent(filters.category)}`;
  if (filters.budgetType) url += `&budget_type=${filters.budgetType}`;
  if (filters.locationType) url += `&location_type=${filters.locationType}`;

  try {
    const data = await api(url);
    const jobs = Array.isArray(data) ? data : (data.jobs || []);
    const total = data.total || jobs.length;
    const totalPages = Math.ceil(total / 15);

    if (jobs.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>No jobs found. Try adjusting your filters.</p></div>`;
    } else {
      list.innerHTML = jobs.map(j => jobCard(j)).join('');

    if (pag && totalPages > 1) {
      const q2 = getQuery();
      pag.innerHTML = Array.from({length:totalPages},(_,i)=>i+1).map(p => {
        q2.set('page', p);
        return `<button class="page-btn ${p===page?'active':''}" onclick="navigate('#/jobs?${q2}')">${p}</button>`;
      }).join('');
    }
  } catch(err) {
    list.innerHTML = `<div class="empty-state"><p>Failed to load jobs: ${esc(err.message)}</p><button class="btn btn-primary btn-sm" onclick="renderJobs()">Retry</button></div>`;
  }
}

          <div class="auth2-sub">${isLogin ? 'Sign in to your account' : 'Browse services and jobs — free to join'}</div>
          <form id="authForm" onsubmit="handleAuth(event,'${mode}','${encodeURIComponent(redirect)}')">
            ${!isLogin ? `
            <div class="form-group">
              <label class="label">Full name</label>
              <input class="input" name="name" placeholder="Jane Smith" required autocomplete="name">
            </div>` : ''}
            <div class="form-group">

            </div>
            <div class="form-group">
              <label class="label">Password</label>
              <input class="input" type="password" name="password" placeholder="${isLogin ? 'Your password' : 'At least 8 characters'}" required minlength="8" autocomplete="${isLogin ? 'current-password' : 'new-password'}">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:var(--space-3);font-size:var(--text-base);font-weight:600">
              ${isLogin ? 'Sign in' : 'Create free account'}
            </button>
          </form>
          <div class="auth2-toggle">
            ${isLogin
              ? `New here? <a onclick="navigate('#/register${redirect?'?redirect='+encodeURIComponent(redirect):''}')">Create a free account</a>`
              : `Already have an account? <a onclick="navigate('#/login${redirect?'?redirect='+encodeURIComponent(redirect):''}')">Sign in</a>`}
          </div>
        </div>
      </div>
    </div>`;
}

async function handleAuth(e, mode, encodedRedirect) {
  e.preventDefault();
  const form = new FormData(e.target);
  const body = Object.fromEntries(form);
  try {
    const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
    const data = await api(endpoint, { method: 'POST', body });
    const { token, ...user } = data;
    state.user = user;
    state.token = token;
    try {
      localStorage.setItem('ghh_token', token);
      localStorage.setItem('ghh_user', JSON.stringify(user));
    } catch(e) {}
    toast(mode === 'login' ? 'Welcome back!' : 'Account created! Welcome to GoHireHumans.', 'success');
    const redirect = encodedRedirect ? decodeURIComponent(encodedRedirect) : '';
    navigate(redirect ? `#/${redirect}` : '#/');
  } catch(err) { toast(err.message, 'error'); }
}

function logout() {
  api('/auth/logout', { method: 'POST' }).catch(() => {});
  state.user = null;
  state.token = null;
  state.sidebarOpen = false;
  try {
    localStorage.removeItem('ghh_token');
    localStorage.removeItem('ghh_user');
  } catch(e) {}
  navigate('#/');
}

async function handlePostService(e, editId) {

  const pricingType = body.pricing_type;
  if (pricingType === 'fixed') { body.price = parseFloat(body.price); delete body.hourly_rate; }
  else { body.hourly_rate = parseFloat(body.hourly_rate); delete body.price; }
  body.delivery_time_days = parseInt(body.delivery_time_days);
  if (body.tags) body.tags = body.tags.split(',').map(t=>t.trim()).filter(Boolean);
  else delete body.tags;

  try {
    if (editId) {
      await api(`/services/${editId}`, { method: 'PUT', body });
      toast('Service updated!', 'success');
      navigate(`#/services/${editId}`);
    } else {

      toast('Service posted!', 'success');
      navigate(`#/services/${svc.id}`);
    }
  } catch(err) { toast(err.message, 'error'); }
}

async function handleHire(jobId, applicationId, workerId) {
  // Check payment status first
  try {
    const status = await api('/payments/status');
    if (!status.employer_ready) {
      const ok = confirm('You need to set up a payment method before hiring. Go to Payments now?');
      if (ok) navigate('#/payments');
      return;
    }
  } catch(err) {
    toast('Could not check payment status: ' + err.message, 'error');
    return;
  }

  // Show hire confirmation with milestone setup
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Confirm Hire</div>
      <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-5)">
        Hiring this worker will fund escrow for the first milestone.
      </p>
      <div class="form-group">
        <label class="label">Milestone Description</label>
        <input class="input" id="milestone-desc" placeholder="e.g. Full project completion" value="Full project completion">
      </div>
      <div class="form-group">
        <label class="label">Milestone Amount ($)</label>
        <input class="input" type="number" id="milestone-amount" placeholder="500.00" min="1" step="0.01">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmHire(${jobId},${applicationId})">Confirm &amp; Fund Escrow</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function confirmHire(jobId, applicationId) {
  const desc = document.getElementById('milestone-desc')?.value || '';
  const amount = parseFloat(document.getElementById('milestone-amount')?.value || '0');
  const overlay = document.querySelector('.modal-overlay');
  try {
    await api(`/jobs/${jobId}/hire`, {
      method: 'POST',
      body: { application_id: applicationId, milestones: [{ description: desc, amount }] }
    });
    overlay?.remove();
    toast('Worker hired! Escrow funded.', 'success');
    navigate(`#/orders`);
  } catch(err) {
    toast(err.message, 'error');
  }
}

async function renderOrderDetail(id) {
  appShell(`<div class="loading"><div class="spinner"></div></div>`, 'orders');

    const order = await api(`/orders/${id}`);
    const milestones = safeParseJSON(order.milestones, []);
    const isWorker = String(order.worker_id) === String(state.user?.id);
    const isEmployer = String(order.employer_id) === String(state.user?.id);
    const isHourly = order.contract_type === 'hourly' || order.budget_type === 'hourly';

    let actions = '';
    if (isWorker && order.status === 'in_progress') {
      actions += `<button class="btn btn-primary" onclick="submitOrder(${id})">Submit Deliverables</button>`;
    }
    if (isEmployer && order.status === 'submitted') {
      actions += `<button class="btn btn-primary" onclick="approveOrder(${id})">Approve &amp; Release Payment</button>

                  <button class="btn btn-danger btn-sm" onclick="disputeOrder(${id})">Dispute</button>`;
    }
    if (['in_progress','pending'].includes(order.status)) {
      actions += `<button class="btn btn-ghost btn-sm" onclick="disputeOrder(${id})">Dispute</button>`;
    }
    if (order.status === 'completed' && !order.my_review) {
      actions += `<button class="btn btn-secondary btn-sm" onclick="leaveReview(${id})">Leave Review</button>`;
    }
    if (isWorker && isHourly && order.status === 'in_progress') {
      actions += `<button class="btn btn-secondary btn-sm" onclick="logHours(${id})">Log Hours</button>`;
    }

    const hourLogs = safeParseJSON(order.hour_logs, []);

    appShell(`
      <button class="detail-back" onclick="navigate('#/orders')">${I.back} Orders</button>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap;margin-top:var(--space-4);margin-bottom:var(--space-6)">
        <div>
          <h1 class="detail-title">${esc(order.title || order.service_title || order.job_title || `Order #${id}`)}</h1>

            ${statusBadge(order.status)}
            <span>${I.dollar} $${Number(order.total_amount||order.amount||0).toFixed(2)}</span>
            <span>Order #${id}</span>

        <div class="detail-content">
          ${milestones.length ? `
            <div class="card" style="margin-bottom:var(--space-4)">
              <div class="card-header"><div class="card-title">Milestones</div></div>
              <div style="display:flex;flex-direction:column;gap:var(--space-3)">
                ${milestones.map((m,i) => `
                  <div style="display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3);background:var(--color-surface-offset);border-radius:var(--radius-md)">
                    <div style="width:28px;height:28px;border-radius:50%;background:${m.status==='completed'?'var(--color-success)':m.status==='in_progress'?'var(--color-primary)':'var(--color-border)'};color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${i+1}</div>
                    <div style="flex:1">
                      <div style="font-size:var(--text-sm);font-weight:600">${esc(m.description||`Milestone ${i+1}`)}</div>
                      <div style="font-size:var(--text-xs);color:var(--color-text-faint)">$${Number(m.amount||0).toFixed(2)}</div>
                    </div>
                    ${statusBadge(m.status||'pending')}
                  </div>`).join('')}
              </div>
            </div>` : ''}

          ${order.deliverable_text || order.submission_note ? `
            <div class="card" style="margin-bottom:var(--space-4)">
              <div class="card-header"><div class="card-title">Worker's Submission</div></div>
              <div style="font-size:var(--text-sm);white-space:pre-wrap;line-height:1.75">${esc(order.deliverable_text||order.submission_note||'')}</div>

              <table class="data-table">
                <thead><tr><th>Date</th><th>Hours</th><th>Description</th></tr></thead>

                  ${hourLogs.map(l=>`<tr><td>${new Date(l.date||l.created_at).toLocaleDateString()}</td><td>${l.hours}</td><td>${esc(l.description||'')}</td></tr>`).join('')}

            </div>` : ''}
        </div>

        <div class="detail-sidebar">
          <div class="card">
            <div class="card-title" style="margin-bottom:var(--space-3)">Order Details</div>
            <div style="font-size:var(--text-xs);display:flex;flex-direction:column;gap:var(--space-2)">

              ${order.employer_name ? `<div><span style="color:var(--color-text-faint)">Client:</span> ${esc(order.employer_name)}</div>` : ''}

async function submitOrder(id) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Submit Deliverables</div>
      <form id="submitForm">
        <div class="form-group">
          <label class="label">Work description / delivery notes</label>
          <textarea class="textarea" name="note" rows="5" required placeholder="Describe what you've completed..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button type="submit" class="btn btn-primary">Submit for Review</button>
        </div>
      </form>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#submitForm').onsubmit = async(e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await api(`/orders/${id}/submit`, { method: 'POST', body: { note: fd.get('note') } });
      overlay.remove();
      toast('Deliverables submitted!', 'success');
      renderOrderDetail(id);
    } catch(err) { toast(err.message, 'error'); }
  };
}

async function approveOrder(id) {
  if (!confirm('Approve this order and release payment to the worker?')) return;
  try {
    await api(`/orders/${id}/approve`, { method: 'POST' });
    toast('Order approved! Payment released.', 'success');
    renderOrderDetail(id);
  } catch(err) { toast(err.message, 'error'); }
}

async function requestRevision(id) {
  const msg = prompt('Describe what needs to be revised:');

  try {
    await api(`/orders/${id}/request-revision`, { method: 'POST', body: { message: msg } });
    toast('Revision requested.', 'info');

  } catch(err) { toast(err.message, 'error'); }
}

async function disputeOrder(id) {
  const reason = prompt('Please describe the issue:');

async function leaveReview(id) {
  let selectedRating = 0;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Leave a Review</div>
      <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-4)">Your review will be visible after both parties submit.</p>
      <div id="ratingStars" class="stars" style="font-size:2rem;justify-content:center;margin-bottom:var(--space-4)">
        ${[1,2,3,4,5].map(i=>`<span class="star" data-r="${i}" style="cursor:pointer;font-size:2rem">☆</span>`).join('')}
      </div>
      <div class="form-group">
        <label class="label">Review (optional)</label>
        <textarea class="textarea" id="reviewText" rows="3" placeholder="Share your experience..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="submitReviewBtn">Submit Review</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('#ratingStars .star').forEach(star => {
    star.onclick = () => {
      selectedRating = parseInt(star.dataset.r);
      overlay.querySelectorAll('#ratingStars .star').forEach((s, i) => {
        s.textContent = i < selectedRating ? '★' : '☆';
        s.classList.toggle('filled', i < selectedRating);
      });
    };
  });
  overlay.querySelector('#submitReviewBtn').onclick = async() => {
    if (!selectedRating) { toast('Please select a star rating', 'error'); return; }
    const review = document.getElementById('reviewText').value;
    try {
      await api(`/orders/${id}/review`, { method: 'POST', body: { rating: selectedRating, review } });
      overlay.remove();
      toast('Review submitted!', 'success');
      renderOrderDetail(id);
    } catch(err) { toast(err.message, 'error'); }
  };
}

async function markNotifRead(id) {
  try {
    await api(`/notifications/${id}/read`, { method: 'PUT' });
    loadNotifCount();
    // Re-render to show updated state
    const el = document.querySelector(`.notif-item[onclick*="markNotifRead(${id})"]`);
    if (el) el.classList.remove('unread');
  } catch(err) {}
}

async function markAllRead() {
  try {
    await api('/notifications/read-all', { method: 'POST' });
    toast('All marked as read', 'success');
    renderNotifications();
    loadNotifCount();
  } catch(err) { toast(err.message, 'error'); }
}

async function loadNotifCount() {
  try {
    const data = await api('/notifications');
    const notifs = Array.isArray(data) ? data : (data.notifications || []);
    const count = notifs.filter(n => !n.is_read).length;
    const badge = document.getElementById('notif-badge');
    if (badge) { badge.textContent = count || ''; badge.style.display = count ? 'inline-flex' : 'none'; }
  } catch(e) {}
}

async function updateProfile(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const base = { name: fd.get('name') };
  const workerBody = {
    bio: fd.get('worker_bio'),
    skills: fd.get('worker_skills').split(',').map(s=>s.trim()).filter(Boolean),
    hourly_rate: parseFloat(fd.get('worker_hourly_rate')) || undefined,
  };
  const employerBody = {
    company_name: fd.get('employer_company'),
    description: fd.get('employer_description'),
  };

  try {
    await Promise.all([
      api('/profile', { method: 'PUT', body: base }),
      api('/profile/worker', { method: 'PUT', body: workerBody }).catch(() => {}),
      api('/profile/employer', { method: 'PUT', body: employerBody }).catch(() => {}),
    ]);
    // Update cached user
    if (state.user) {
      state.user.name = base.name;
      try { localStorage.setItem('ghh_user', JSON.stringify(state.user)); } catch {}
    }
    toast('Profile updated!', 'success');
  } catch(err) { toast(err.message, 'error'); }
}

// ═══════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════
function render() {
  const hash = location.hash.slice(1) || '/';
  const path = hash.split('?')[0];
  const segments = path.split('/').filter(Boolean);

  // ── Public routes ────────────────────────────────────────
  if (path === '/') {
    if (state.user && state.token) return renderDashboard();
    return renderLanding();
  }
  if (path === '/login' || path === '/auth') return renderAuth('login');
  if (path === '/register') return renderAuth('register');
  if (path === '/terms') return renderTerms();
  if (path === '/guidelines') return renderGuidelines();

  // ── Public marketplace (no auth required) ────────────────
  if (path === '/services') return renderServices();
  if (path.match(/^\/services\/(\d+)$/)) return renderServiceDetail(segments[1]);
  if (path === '/jobs') return renderJobs();
  if (path.match(/^\/jobs\/(\d+)$/) && !path.includes('/applicants')) return renderJobDetail(segments[1]);

  // ── Auth required ─────────────────────────────────────────
  if (!state.user || !state.token) {
    navigate(`#/login?redirect=${encodeURIComponent(path.slice(1))}`);
    return;
  }

  if (path === '/dashboard') return renderDashboard();
  if (path === '/my-services') return renderMyServices();
  if (path === '/post-service') return renderPostService();
  if (path.match(/^\/edit-service\/(\d+)$/)) return renderPostService(segments[1]);
  if (path === '/post-job') return renderPostJob();
  if (path === '/my-jobs') return renderMyJobs();
  if (path.match(/^\/jobs\/(\d+)\/applicants$/)) return renderJobApplicants(segments[1]);
  if (path === '/orders') return renderOrders();
  if (path.match(/^\/orders\/(\d+)$/)) return renderOrderDetail(segments[1]);
  if (path === '/payments') return renderPayments();
  if (path === '/notifications') return renderNotifications();
  if (path === '/profile' || path === '/settings') return renderProfile();

  // ── Admin routes ──────────────────────────────────────────
  if (path === '/admin') return renderAdminDashboard();
  if (path === '/admin/users') return renderAdminUsers();
  if (path === '/admin/orders') return renderAdminOrders();
  if (path === '/admin/revenue') return renderAdminRevenue();
  if (path === '/admin/disputes') return renderAdminDisputes();
  if (path === '/admin/audit') return renderAdminAudit();

  // ── Fallback ──────────────────────────────────────────────
  if (state.user) return renderDashboard();
  return renderLanding();
}

window.addEventListener('hashchange', render);
render();
